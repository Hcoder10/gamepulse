<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GamePulse Copilot{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { 50: '#FFFEFB', 100: '#FEFCF6', 200: '#FBF6EC', 300: '#F5EDDD' },
                        sage: {
                            50: '#F2F7EE', 100: '#E2EDDA', 200: '#C5DBB5', 300: '#A2C58A',
                            400: '#7DAE63', 500: '#5F9142', 600: '#4A7534', 700: '#395B2A',
                            800: '#304A24', 900: '#283D1F',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js"></script>

    <style>
        body { font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11'; }
        ::selection { background: #C5DBB5; color: #1c1917; }
        .hljs { background: transparent !important; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-cream-100 text-stone-800 font-sans min-h-screen flex flex-col antialiased">

    <nav class="bg-white/80 backdrop-blur-md border-b border-stone-200/80 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 flex items-center justify-between h-16">
            <a href="/" class="flex items-center gap-2.5 group">
                <div class="w-8 h-8 bg-sage-500 rounded-lg flex items-center justify-center shadow-sm group-hover:bg-sage-600 transition-colors">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                    </svg>
                </div>
                <span class="font-bold text-lg text-stone-800 tracking-tight">GamePulse <span class="text-sage-500">Copilot</span></span>
            </a>
            <div class="flex items-center gap-1">
                <a href="/dashboard/" class="px-4 py-2 text-sm font-medium rounded-lg transition-all text-stone-500 hover:text-sage-700 hover:bg-sage-50">Dashboard</a>
                <a href="/copilot/" class="px-4 py-2 text-sm font-medium rounded-lg transition-all {% block nav_chat %}text-stone-500 hover:text-sage-700 hover:bg-sage-50{% endblock %}">Agent</a>
                <a href="/copilot/pipeline/" class="px-4 py-2 text-sm font-medium rounded-lg transition-all {% block nav_pipeline %}text-stone-500 hover:text-sage-700 hover:bg-sage-50{% endblock %}">Pipeline</a>
                <a href="/copilot/plugin/" class="px-4 py-2 text-sm font-medium rounded-lg transition-all {% block nav_plugin %}text-stone-500 hover:text-sage-700 hover:bg-sage-50{% endblock %}">Plugin</a>
                <a href="/copilot/about/" class="px-4 py-2 text-sm font-medium rounded-lg transition-all {% block nav_about %}text-stone-500 hover:text-sage-700 hover:bg-sage-50{% endblock %}">About</a>
            </div>
        </div>
    </nav>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    {% block footer %}
    <footer class="border-t border-stone-200/80 bg-white/50">
        <div class="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between text-sm text-stone-400">
            <span>GamePulse — Built with Mistral AI + W&B Weave</span>
            <div class="flex items-center gap-6">
                <a href="/" class="hover:text-sage-600 transition-colors">Home</a>
                <a href="/dashboard/" class="hover:text-sage-600 transition-colors">Dashboard</a>
            </div>
        </div>
    </footer>
    {% endblock %}

    {% block extra_js %}{% endblock %}
</body>
</html>
