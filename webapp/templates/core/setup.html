<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup — GamePulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pulse: {
                            50: '#effdf5', 100: '#d9fbe8', 200: '#b5f5d3',
                            300: '#7ceab2', 400: '#3dd88a', 500: '#1abf6b',
                            600: '#0f9d56', 700: '#107d47', 800: '#12633b',
                        },
                        surface: { 800: '#111827', 700: '#1f2937', 600: '#374151' },
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11'; }
        ::selection { background: #1abf6b40; }
        .gradient-text {
            background: linear-gradient(135deg, #1abf6b 0%, #0f9d56 50%, #107d47 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        .float { animation: float 4s ease-in-out infinite; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        .fade-up { animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both; }
        .fade-up-d1 { animation-delay: 0.1s; }
        .fade-up-d2 { animation-delay: 0.2s; }
        .fade-up-d3 { animation-delay: 0.3s; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen bg-gray-50 flex items-center justify-center p-6">

<!-- Subtle background gradient -->
<div class="fixed inset-0 -z-10">
    <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-pulse-200/30 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-emerald-100/40 rounded-full blur-3xl"></div>
</div>

<div class="w-full max-w-lg">
    <!-- Logo -->
    <div class="text-center mb-10 fade-up">
        <div class="inline-flex items-center gap-3 mb-6">
            <div class="w-12 h-12 rounded-2xl bg-pulse-500 flex items-center justify-center shadow-lg shadow-pulse-500/20 float">
                <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <span class="text-2xl font-black tracking-tight text-gray-900">GamePulse</span>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tight text-gray-900 mb-2">Let's set you up</h1>
        <p class="text-gray-500">Tell us about you and your games, and we'll start analyzing.</p>
    </div>

    <!-- Form -->
    <form method="POST" action="/setup/" class="space-y-6">
        {% csrf_token %}

        <!-- Username -->
        <div class="fade-up fade-up-d1">
            <label class="text-[13px] font-semibold text-gray-700 block mb-2">Your name or Roblox username</label>
            <input name="username" type="text" value="{{ username }}" placeholder="e.g. BuilderSteve"
                   class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3.5 text-[15px] text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pulse-500/30 focus:border-pulse-500 transition-all shadow-sm">
        </div>

        <!-- Game IDs -->
        <div class="fade-up fade-up-d2">
            <label class="text-[13px] font-semibold text-gray-700 block mb-2">Your game IDs or URLs <span class="text-gray-400 font-normal">(one per line)</span></label>
            <textarea name="games" rows="4" placeholder="Paste Roblox game URLs or universe IDs, e.g.&#10;https://www.roblox.com/games/2753915549/Blox-Fruits&#10;994732206"
                      class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3.5 text-[14px] font-mono text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pulse-500/30 focus:border-pulse-500 transition-all shadow-sm resize-none">{% if game_ids %}{% for gid in game_ids %}{{ gid }}{% if not forloop.last %}
{% endif %}{% endfor %}{% endif %}</textarea>
            <p class="text-[12px] text-gray-400 mt-1.5">We accept universe IDs, place IDs, and full Roblox URLs.</p>
        </div>

        <!-- Divider -->
        <div class="flex items-center gap-4 fade-up fade-up-d2">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="text-[12px] font-medium text-gray-400">OR</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Demo button -->
        <div class="fade-up fade-up-d2">
            <button type="submit" name="use_demo" value="1"
                    class="w-full flex items-center justify-center gap-3 px-5 py-3.5 bg-white border-2 border-dashed border-gray-300 rounded-xl text-[14px] font-semibold text-gray-600 hover:border-pulse-400 hover:text-pulse-700 hover:bg-pulse-50/50 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                Try with demo games (Blox Fruits, Adopt Me, etc.)
            </button>
        </div>

        <!-- Submit -->
        <div class="fade-up fade-up-d3">
            <button type="submit"
                    class="w-full px-6 py-4 bg-pulse-500 text-white font-bold rounded-xl text-[15px] hover:bg-pulse-600 transition-colors shadow-lg shadow-pulse-500/20 flex items-center justify-center gap-2">
                Launch Dashboard
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                </svg>
            </button>
        </div>
    </form>

    <!-- Back link -->
    <div class="text-center mt-6 fade-up fade-up-d3">
        <a href="/" class="text-[13px] text-gray-400 hover:text-gray-600 transition-colors">Back to home</a>
    </div>
</div>

</body>
</html>
